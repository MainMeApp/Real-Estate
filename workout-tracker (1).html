<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>The Takeover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F6FA;--bg2:#fff;--navy:#0D1B3E;--navy2:#1A2B5F;
  --orange:#E85D2F;--green:#1A8F5A;--border:#DDE2EE;
  --muted:#6B7A9B;--dim:#A0AABF;--faint:#C5CBDA;
  --text:#0D1B3E;--shadow:0 2px 12px rgba(13,27,62,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#C5CBDA;border-radius:2px}

/* APP SHELL */
.app-shell{max-width:520px;margin:0 auto;background:var(--bg)}
.app-header{background:#fff;padding:14px 16px 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.app-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:var(--navy);letter-spacing:1px;text-transform:uppercase}
.app-sub{font-size:9px;color:var(--dim);font-weight:700;letter-spacing:1.4px;text-transform:uppercase;margin-top:1px}
.app-date{font-size:10px;color:var(--dim);font-weight:600;margin-top:2px}
.week-picker{display:flex;align-items:center;gap:8px}
.wk-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:18px;cursor:pointer;color:var(--navy);display:flex;align-items:center;justify-content:center}
.wk-label{text-align:center;min-width:54px}
.wk-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--navy)}
.wk-of{display:block;font-size:9px;color:var(--dim);font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.tabs{display:flex;gap:0;border-top:1px solid var(--border);margin-top:10px}
.tab{flex:1;padding:9px 2px 8px;background:none;border:none;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.save-ind{font-size:10px;color:var(--green);font-weight:600;padding:3px 12px;text-align:right}

/* CONTENT */
#content{padding:12px 12px 80px}
.panel{display:none}
.panel.active{display:block}

/* DAY GRID */
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.day-btn{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:6px 2px;cursor:pointer;text-align:center;font-family:'Inter',sans-serif}
.day-btn.active{border-color:transparent}
.day-abbr{display:block;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:inherit}
.day-sub{display:block;font-size:7px;color:inherit;opacity:.8;margin-top:1px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* DAY HEADER */
.day-hdr{border-radius:14px;padding:14px 16px;margin-bottom:12px}
.day-hdr-top{display:flex;justify-content:space-between;align-items:flex-start}
.day-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:1px;color:var(--navy)}
.day-meta{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500}
.day-pct{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;text-align:right;color:var(--navy)}
.day-pct-sub{font-size:10px;color:var(--muted)}
.pb-bg{height:5px;background:rgba(13,27,62,.1);border-radius:3px;margin-top:10px}
.pb-fill{height:100%;border-radius:3px;transition:width .4s}

/* STREAK */
.streak-bar{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:12px;display:flex;align-items:center;gap:12px}
.streak-fire{font-size:28px;flex-shrink:0}
.streak-info{flex:1}
.streak-count{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:var(--navy);line-height:1}
.streak-count span{font-size:13px;font-weight:600;color:var(--muted);margin-left:2px}
.streak-sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
.streak-dots{display:flex;gap:4px;margin-top:6px}
.sdot{width:9px;height:9px;border-radius:50%;background:#EEF0F8}
.sdot.hit{background:#1A8F5A}
.sdot.cur{background:var(--navy);box-shadow:0 0 0 2px #C8DAFF}
.streak-best{text-align:right;flex-shrink:0}
.streak-best-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--navy);display:block}
.streak-best-lbl{font-size:9px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.6px}

/* EXERCISE CARDS */
.ex-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border)}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px}
.ex-info{flex:1}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--navy);letter-spacing:.4px}
.ex-meta{font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
.ex-inputs{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;align-items:end}
.inp-lbl{font-size:9px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.inp-w,.inp-r,.inp-s{width:100%;background:#F5F6FA;border:1.5px solid var(--border);border-radius:8px;padding:8px 6px;font-size:15px;font-weight:700;font-family:'Barlow Condensed',sans-serif;color:var(--navy);outline:none;text-align:center}
.inp-w:focus,.inp-r:focus,.inp-s:focus{border-color:var(--navy)}
.done-btn{width:38px;height:38px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.done-btn.on{background:#E8F7EF;border-color:#1A8F5A;color:#1A8F5A}

/* SMART REC */
.smart-rec{background:#F5F6FA;border-radius:8px;padding:8px 10px;margin:10px 0;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.smart-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.smart-badge.up,.smart-badge.double_up{background:#1A8F5A}
.smart-badge.hold{background:#FF9800}
.smart-badge.down{background:#EF5350}
.smart-badge.first{background:#2196F3}
.smart-weight{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:var(--navy);flex-shrink:0}
.smart-reason{font-size:11px;color:var(--muted);font-weight:500;flex:1;min-width:100px}

/* REST TIMER */
.rest-timer-bar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin:10px 0;padding:8px 10px;background:#F5F6FA;border-radius:8px}
.timer-display{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;color:var(--navy);min-width:36px;text-align:center}
.timer-pb{flex:1;height:4px;background:#DDE2EE;border-radius:2px;min-width:40px}
.timer-pb-fill{height:100%;background:var(--navy);border-radius:2px;transition:width 1s linear}
.timer-btn{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;color:var(--navy)}
.timer-btn.active,.timer-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.timer-start{background:var(--green);color:#fff;border-color:var(--green)}
.timer-start:hover{background:#157A4A}

/* DETAILS */
.details-toggle{width:100%;background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;padding:6px 0;font-family:'Inter',sans-serif;font-weight:600}
.details-panel{padding-top:8px}
.rpe-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rpe-lbl{font-size:11px;font-weight:700;color:var(--navy);min-width:24px}
.rpe-slider{flex:1;accent-color:var(--navy)}
.rpe-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:var(--navy);min-width:20px;text-align:center}
.ex-notes{width:100%;background:#F5F6FA;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px;font-family:'Inter',sans-serif;color:var(--navy);resize:none;outline:none}

/* ALT */
.alt-row{display:flex;align-items:center;gap:8px;margin:8px 0}
.alt-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;font-weight:600}
.alt-select{flex:1;background:#F5F6FA;border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 9px;font-size:12px;outline:none;font-family:'Inter',sans-serif;cursor:pointer}

/* QUICKFILL */
.quickfill-btn{background:#EEF2FF;border:1px solid #C8DAFF;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--navy);cursor:pointer;margin-top:4px;font-family:'Inter',sans-serif}
.quickfill-btn.filled{background:#E8F7EF;border-color:#A8DFC0}

/* REST DAY CARD */
.rest-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;box-shadow:var(--shadow)}
.rest-icon{font-size:36px;margin-bottom:8px}
.rest-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--navy);letter-spacing:1px;margin-bottom:4px}
.rest-sub{font-size:12px;color:var(--muted);margin-bottom:12px}
.big-ta{width:100%;background:#F5F6FA;border:1px solid var(--border);border-radius:10px;padding:10px;font-size:13px;font-family:'Inter',sans-serif;color:var(--navy);resize:none;outline:none;margin-top:4px}

/* SESSION NOTE & LOCK */
.session-note-area{margin-top:12px}
.slabel{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.session-ta{width:100%;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;font-size:13px;font-family:'Inter',sans-serif;color:var(--navy);resize:none;outline:none}
.lock-btn{width:100%;margin-top:10px;padding:14px;border-radius:12px;border:none;background:var(--navy);color:#fff;font-weight:800;font-size:15px;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:.5px}
.lock-btn:hover{background:var(--navy2)}
.session-summary{background:#E8F7EF;border:1px solid #A8DFC0;border-radius:12px;padding:14px;margin-top:10px;display:none}
.ss-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:var(--green);margin-bottom:6px}
.ss-item{font-size:12px;color:var(--navy);padding:2px 0;font-weight:500}

/* CARDIO */
.cardio-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border)}
.cardio-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:var(--navy);margin-bottom:10px;letter-spacing:.5px}
.cardio-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cardio-cell{background:#F5F6FA;border-radius:8px;padding:10px}
.cardio-cell-lbl{font-size:9px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.cardio-cell-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--navy)}
.cardio-cell-sub{font-size:10px;color:var(--muted);font-weight:500}

/* NUTRITION */
.nutr-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.nutr-date{font-size:12px;color:var(--muted);font-weight:600}
.day-type-toggle{display:flex;gap:6px;margin-bottom:12px}
.dtt-btn{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;color:var(--muted)}
.dtt-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.macro-ring-area{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.macro-box{background:#fff;border-radius:12px;padding:12px 8px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border)}
.macro-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--navy)}
.macro-lbl{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}
.macro-target{font-size:9px;color:var(--faint);font-weight:600}
.nutr-bar-bg{height:6px;background:#EEF0F8;border-radius:3px;margin-bottom:14px}
.nutr-bar-fill{height:100%;border-radius:3px;background:var(--green);transition:width .4s;max-width:100%}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.preset-btn{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 8px;cursor:pointer;text-align:left;font-family:'Inter',sans-serif}
.preset-btn:hover{border-color:var(--navy);background:#F5F8FF}
.preset-icon{font-size:18px;margin-bottom:3px}
.preset-name{font-size:11px;font-weight:700;color:var(--navy)}
.preset-macros{font-size:10px;color:var(--muted);font-weight:500;margin-top:1px}
.meal-log{margin-top:12px}
.meal-entry{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid var(--border)}
.meal-entry-name{font-size:13px;font-weight:700;color:var(--navy)}
.meal-entry-cals{font-size:12px;color:var(--muted);font-weight:600}
.meal-entry-del{background:none;border:none;color:var(--faint);font-size:16px;cursor:pointer;padding:0 4px}
.meal-entry-del:hover{color:#EF5350}
.custom-add{display:flex;gap:6px;margin-bottom:10px}
.custom-inp{flex:1;background:#F5F6FA;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:'Inter',sans-serif;color:var(--navy);outline:none}
.custom-inp:focus{border-color:var(--navy)}
.custom-add-btn{padding:8px 14px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-weight:700;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}

/* PROGRESS */
.ov-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:14px}
.ov-cell{background:#fff;border-radius:8px;padding:8px 4px;text-align:center;border:1.5px solid var(--border);cursor:pointer}
.ov-cell.current{border-color:var(--navy)}
.ov-cell.done{background:#E8F7EF;border-color:#A8DFC0}
.ov-wk{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;color:var(--navy)}
.ov-pct{font-size:9px;color:var(--muted);font-weight:600;margin-top:1px}
.checkin-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border)}
.checkin-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:var(--navy);margin-bottom:10px;letter-spacing:.5px}
.checkin-ta{width:100%;background:#F5F6FA;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;font-family:'Inter',sans-serif;color:var(--navy);resize:none;outline:none}

/* SYNC */
.sync-btn{width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--navy);font-weight:700;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sync-btn:hover{background:#F5F8FF;border-color:var(--navy)}
.sync-danger{border-color:#FFCDD2;color:#EF5350}
.sync-danger:hover{background:#FFF5F5;border-color:#EF5350}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app-shell">
  <div class="app-header">
    <div class="app-top">
      <div>
        <div class="app-title">THE TAKEOVER</div>
        <div class="app-sub">6-Week &middot; Chest/Shoulders/Bis &middot; Back/Tris &middot; Legs</div>
        <div class="app-date" id="app-date-lbl"></div>
      </div>
      <div class="week-picker">
        <button class="wk-btn" onclick="changeWeek(-1)">&#8249;</button>
        <div class="wk-label">
          <span class="wk-num" id="wk-display">WK 1</span>
          <span class="wk-of">of 6</span>
        </div>
        <button class="wk-btn" onclick="changeWeek(1)">&#9250;</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('workout',this)">&#128170; Workout</button>
      <button class="tab" onclick="switchTab('cardio',this)">&#127939; Cardio</button>
      <button class="tab" onclick="switchTab('nutrition',this)">&#129385; Nutrition</button>
      <button class="tab" onclick="switchTab('progress',this)">&#128202; Progress</button>
      <button class="tab" onclick="switchTab('sync',this)">&#128260; Sync</button>
    </div>
  </div>
  <div class="save-ind" id="save-ind">&#9679; autosave on</div>

  <div id="content">
    <div id="panel-workout" class="panel active">
      <div id="day-grid"></div>
      <div id="streak-area"></div>
      <div id="day-header-area"></div>
      <div id="exercise-list"></div>
      <div id="session-note-area"></div>
    </div>

    <div id="panel-cardio" class="panel">
      <div id="cardio-content"></div>
    </div>

    <div id="panel-nutrition" class="panel">
      <div class="nutr-header">
        <div class="nutr-date" id="nutr-date-lbl"></div>
      </div>
      <div class="day-type-toggle">
        <button class="dtt-btn active" id="dtt-lift" onclick="setDayType('lift')">&#127947; Lift Day</button>
        <button class="dtt-btn" id="dtt-rest" onclick="setDayType('rest')">&#128564; Rest Day</button>
      </div>
      <div class="macro-ring-area" id="macro-area"></div>
      <div class="nutr-bar-bg"><div class="nutr-bar-fill" id="cal-bar" style="width:0%"></div></div>
      <div class="slabel">Quick Add</div>
      <div class="preset-grid" id="preset-grid"></div>
      <div class="slabel" style="margin-top:8px">Custom Entry</div>
      <div class="custom-add">
        <input class="custom-inp" id="custom-name" placeholder="Food name">
        <input class="custom-inp" id="custom-cal" placeholder="kcal" type="number" style="width:70px;flex:none">
        <input class="custom-inp" id="custom-prot" placeholder="protein g" type="number" style="width:80px;flex:none">
        <button class="custom-add-btn" onclick="addCustomMeal()">+ Add</button>
      </div>
      <div class="meal-log" id="meal-log"></div>
    </div>

    <div id="panel-progress" class="panel">
      <div class="slabel" style="margin-bottom:8px">Program Overview</div>
      <div class="ov-grid" id="ov-grid"></div>
      <div id="checkin-area"></div>
    </div>

    <div id="panel-sync" class="panel">
      <div class="slabel" style="margin-bottom:12px">Sync &amp; Backup</div>
      <button class="sync-btn" onclick="exportData()">&#128190; Export — Copy to Clipboard</button>
      <button class="sync-btn" onclick="importData()">&#128229; Import — Paste from Clipboard</button>
      <button class="sync-btn sync-danger" onclick="clearData()">&#128465; Clear All Data</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────
const SKEY = 'takeover_v6';

const SPLIT = [
  {key:'mon',day:'MON',label:'Chest / Shoulders / Bis', color:'#FF6B35'},
  {key:'tue',day:'TUE',label:'Rest',                    color:'#26A69A'},
  {key:'wed',day:'WED',label:'Back / Tris / Abs',       color:'#2196F3'},
  {key:'thu',day:'THU',label:'Rest',                    color:'#26A69A'},
  {key:'fri',day:'FRI',label:'Chest / Shoulders / Bis', color:'#FF6B35'},
  {key:'sat',day:'SAT',label:'Legs & Abs',              color:'#9C27B0'},
  {key:'sun',day:'SUN',label:'Rest',                    color:'#26A69A'},
];

const WORKOUTS = {
  mon:{label:'Chest, Shoulders & Biceps', exercises:[
    {id:'sm_bench',     name:'Smith Machine Bench Press',  sets:4, reps:'6-10',      b:[185,192.5,200,207.5,215,222.5]},

// ── SMART RECOMMENDATION ─────────────────────────────────────────
function roundTo(v, step){ return Math.round(v/step)*step; }

function getWeightBump(w){
  if(w<=50)  return 2.5;
  if(w<=150) return 5;
  if(w<=225) return 7.5;
  return 10;
}

function parseReps(rStr){
  if(!rStr) return [8,12];
  var m = String(rStr).match(/(\d+)\s*[-–]\s*(\d+)/);
  if(m) return [parseInt(m[1]), parseInt(m[2])];
  var n = parseInt(rStr);
  return [n,n];
}

function smartTarget(ex, curWeek, curDay){
  var baseline = ex.b[curWeek-1];
  if(curWeek===1) return {weight:baseline, label:'PLAN', type:'first', reason:'Week 1 baseline.'};

  var prev = gl(curWeek-1, curDay, ex.id);
  if(!prev.weight) return {weight:baseline, label:'PLAN', type:'first', reason:'No prior data — use baseline.'};

  var prevWeight = parseFloat(prev.weight);
  if(isNaN(prevWeight)) return {weight:baseline, label:'PLAN', type:'first', reason:'No prior data.'};

  var prevReps = parseInt(prev.reps)||0;
  var prevSets = parseInt(prev.sets)||0;
  var targetSets = ex.sets;
  var rng = parseReps(ex.reps);
  var rMin=rng[0], rMax=rng[1];
  var prevRpe = prev.rpe ? parseInt(prev.rpe) : null;

  // Missed sets — back off
  if(prevSets > 0 && prevSets < targetSets-1){
    var wo = roundTo(Math.max(prevWeight-5, prevWeight*0.9), 2.5);
    return {weight:wo, label:'BACK OFF', type:'down', reason:'Missed sets — drop weight and build back.'};
  }

  // Hit top of range or easy — increase
  if(prevReps >= rMax && (prevRpe===null || prevRpe<=8)){
    var bump = getWeightBump(prevWeight);
    var nw = roundTo(prevWeight+bump, 2.5);
    return {weight:nw, label:'INCREASE', type:'up', reason:'Hit top of range — add '+bump+' lbs.'};
  }

  // Mid-range but easy — also increase
  var mid = Math.round((rMin+rMax)/2);
  var stale = curWeek>2 && gl(curWeek-2,curDay,ex.id).weight && parseFloat(gl(curWeek-2,curDay,ex.id).weight)===prevWeight;
  if((prevRpe!==null && prevRpe<=7 && prevReps>=mid) || stale){
    var bump2 = getWeightBump(prevWeight);
    var nw2 = roundTo(prevWeight+bump2, 2.5);
    return {weight:nw2, label:'INCREASE', type:'up', reason:(stale?'Same weight 2+ weeks':'Comfortable — room to go heavier')+'. Add '+bump2+' lbs.'};
  }

  // Hold
  return {weight:prevWeight, label:'HOLD', type:'hold', reason:'Hit '+prevReps+' reps — push to '+rMax+' before increasing.'};
}

    var short = s.label.split('/')[0].split('&')[0].trim().split(' ')[0];
    btn.innerHTML = '<span class="day-abbr">'+s.day+'</span><span class="day-sub">'+short+'</span>';

    ? '<div class="day-pct" style="color:'+pc+'">'+pct+'%</div><div class="day-pct-sub">'+done+'/'+total+' done</div>'

    + '<div class="day-hdr-top">'
    + '<div><div class="day-title" style="color:var(--navy)">'+wo.label+'</div>'

  var noteKey = 'sn_w'+week+'_'+day;
  var note = logs[noteKey]||'';
  area.innerHTML = '<div class="session-note-area">'
    + '<div class="slabel">Session Notes</div>'
    + '<textarea class="session-ta" rows="2" placeholder="How did it go?">' + note + '</textarea>'
    + '<button class="lock-btn" onclick="lockSession()">&#128274; Lock In Session</button>'
    + '<div class="session-summary" id="sess-sum"></div>'
    + '</div>';
  area.querySelector('.session-ta').addEventListener('change', function(e){
    logs[noteKey]=e.target.value; save();
  });

function lockSession(){
  var wo = WORKOUTS[day];
  var lines = wo.exercises.map(function(ex){
    var lg = gl(week,day,ex.id);
    return (lg.done?'&#10003; ':'&#9675; ') + ex.name + (lg.weight?' &mdash; '+lg.weight+' lbs':'') + (lg.reps?' x '+lg.reps:'') + (lg.sets?' x '+lg.sets+' sets':'');
  });
  var el = document.getElementById('sess-sum');
  if(el){
    el.style.display='block';
    el.innerHTML = '<div class="ss-title">&#127942; Session Locked</div>' + lines.map(function(l){ return '<div class="ss-item">'+l+'</div>'; }).join('');
  }
  renderStreakBar();
  toast('Session locked in! &#127942;');
}

// ── REST TIMER ────────────────────────────────────────────────────
function startTimer(exId, tid, pbid, secs){
  if(activeTimers[exId]) clearInterval(activeTimers[exId]);
  var elapsed = 0;
  var total   = secs;
  var dispEl  = document.getElementById(tid);
  var pbEl    = document.getElementById(pbid);
  activeTimers[exId] = setInterval(function(){
    elapsed++;
    var rem = total - elapsed;
    if(dispEl) dispEl.textContent = rem > 0 ? Math.floor(rem/60)+':'+(rem%60<10?'0':'')+(rem%60) : 'GO!';
    if(pbEl)   pbEl.style.width   = Math.max(0,(1-elapsed/total)*100)+'%';
    if(elapsed >= total){ clearInterval(activeTimers[exId]); delete activeTimers[exId]; }
  }, 1000);
}

// ── STREAK ────────────────────────────────────────────────────────
function getWeekPct(wk){
  var days = ['mon','wed','fri','sat'];
  var total = days.reduce(function(a,dk){ return a+(WORKOUTS[dk]?WORKOUTS[dk].exercises.length:0); },0);
  if(!total) return 0;
  var done = days.reduce(function(a,dk){
    return a + (WORKOUTS[dk]?WORKOUTS[dk].exercises.filter(function(ex){ return gl(wk,dk,ex.id).done; }).length:0);
  },0);
  return done/total;
}

function renderStreakBar(){
  var el = document.getElementById('streak-area');
  if(!el) return;
  var streak=0;
  for(var wk=week;wk>=1;wk--){
    var pct=getWeekPct(wk);
    if(wk===week&&pct>0) streak++;
    else if(wk<week&&pct>=0.6) streak++;
    else if(wk<week) break;
  }
  var fire = streak>=4?'&#x1F525;':streak>=2?'&#x26A1;':'&#x1F4AA;';
  var msg  = ['Start your streak today.','Week 1 done. Keep going.','Back-to-back. Habit forming.','3 weeks locked in.','4 straight. Most quit. Not you.','5 weeks. One left. Finish it.','PROGRAM COMPLETE. &#x1F3C6;'][Math.min(streak,6)];
  var dots = '';
  for(var i=1;i<=6;i++){
    var p=getWeekPct(i);
    var cls = i===week?'sdot cur':p>=0.6?'sdot hit':'sdot';
    dots += '<div class="'+cls+'"></div>';
  }
  el.innerHTML = '<div class="streak-bar">'
    + '<div class="streak-fire">'+fire+'</div>'
    + '<div class="streak-info">'
    + '<div class="streak-count">'+streak+'<span>week streak</span></div>'
    + '<div class="streak-sub">'+msg+'</div>'
    + '<div class="streak-dots">'+dots+'</div>'
    + '</div>'
    + '</div>';
}

// ── CARDIO ────────────────────────────────────────────────────────
function renderCardio(){
  var el = document.getElementById('cardio-content');
  var ci = CARDIO[Math.min(Math.floor((week-1)/2), CARDIO.length-1)];
  el.innerHTML = '<div class="cardio-card">'
    + '<div class="cardio-title">Week '+week+' Cardio Targets</div>'
    + '<div class="cardio-grid">'
    + '<div class="cardio-cell"><div class="cardio-cell-lbl">Incline Walk</div><div class="cardio-cell-val">'+ci.walk.speed+'</div><div class="cardio-cell-sub">Incline '+ci.walk.inc+'</div></div>'
    + '<div class="cardio-cell"><div class="cardio-cell-lbl">Stair Machine</div><div class="cardio-cell-val">Level '+ci.stairs.level+'</div><div class="cardio-cell-sub">'+ci.stairs.dur+'</div></div>'
    + '</div></div>'
    + '<div class="cardio-card" style="margin-top:8px"><div class="cardio-title">Schedule</div>'
    + '<div style="font-size:13px;color:var(--muted);line-height:1.8;font-weight:500">'
    + '&#127939; WED &mdash; Core cardio day (30-40 min)<br>'
    + '&#127939; SAT &mdash; Post-legs cardio (20-30 min)<br>'
    + '&#127939; Optional &mdash; Any morning, low intensity'
    + '</div></div>';
}

// ── NUTRITION ─────────────────────────────────────────────────────
function setDayType(type){
  dayType = type;
  document.getElementById('dtt-lift').className = 'dtt-btn'+(type==='lift'?' active':'');
  document.getElementById('dtt-rest').className = 'dtt-btn'+(type==='rest'?' active':'');
  var n = getNutr(); n.dayType=type; saveNutr(n);
  renderNutrition();
}

function addMealEntry(name, cal, prot){
  var n = getNutr();
  n.meals = n.meals || [];
  n.meals.push({name:name, cal:parseInt(cal)||0, prot:parseInt(prot)||0});
  saveNutr(n);
  renderNutrition();
}

function addCustomMeal(){
  var name = document.getElementById('custom-name').value.trim();
  var cal  = document.getElementById('custom-cal').value;
  var prot = document.getElementById('custom-prot').value;
  if(!name||!cal){ toast('Enter food name and calories'); return; }
  addMealEntry(name, cal, prot||0);
  document.getElementById('custom-name').value='';
  document.getElementById('custom-cal').value='';
  document.getElementById('custom-prot').value='';
  toast('Added: '+name);
}

function deleteMeal(idx){
  var n = getNutr();
  n.meals.splice(idx,1);
  saveNutr(n);
  renderNutrition();
}

function renderNutrition(){
  var n    = getNutr();
  dayType  = n.dayType||'lift';
  var meals = n.meals||[];
  var calTarget  = dayType==='lift' ? CAL_LIFT : CAL_REST;
  var totalCal   = meals.reduce(function(a,m){ return a+m.cal; },0);
  var totalProt  = meals.reduce(function(a,m){ return a+m.prot; },0);
  var calPct     = Math.min(100, Math.round(totalCal/calTarget*100));

  document.getElementById('dtt-lift').className='dtt-btn'+(dayType==='lift'?' active':'');
  document.getElementById('dtt-rest').className='dtt-btn'+(dayType==='rest'?' active':'');

  var d = new Date();
  document.getElementById('nutr-date-lbl').textContent = d.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'});

  document.getElementById('macro-area').innerHTML =
    '<div class="macro-box"><div class="macro-val">'+totalCal+'</div><div class="macro-lbl">Calories</div><div class="macro-target">/ '+calTarget+'</div></div>'
    +'<div class="macro-box"><div class="macro-val">'+totalProt+'g</div><div class="macro-lbl">Protein</div><div class="macro-target">/ '+PROT_TARGET+'g</div></div>'
    +'<div class="macro-box"><div class="macro-val">'+(calTarget-totalCal)+'</div><div class="macro-lbl">Remaining</div><div class="macro-target">kcal left</div></div>';

  document.getElementById('cal-bar').style.width = calPct+'%';

  document.getElementById('preset-grid').innerHTML = MEAL_PRESETS.map(function(p,i){
    return '<button class="preset-btn" onclick="addMealEntry(\''+p.name+'\','+p.cal+','+p.prot+')">'
      +'<div class="preset-icon">'+p.emoji+'</div>'
      +'<div class="preset-name">'+p.name+'</div>'
      +'<div class="preset-macros">'+p.cal+' kcal &middot; '+p.prot+'g prot</div>'
      +'</button>';
  }).join('');

  document.getElementById('meal-log').innerHTML = meals.length
    ? meals.map(function(m,i){
        return '<div class="meal-entry">'
          +'<div><div class="meal-entry-name">'+m.name+'</div><div class="meal-entry-cals">'+m.cal+' kcal &middot; '+m.prot+'g prot</div></div>'
          +'<button class="meal-entry-del" onclick="deleteMeal('+i+')">&#10005;</button>'
          +'</div>';
      }).join('')
    : '<div style="text-align:center;padding:16px;color:var(--dim);font-size:12px">No meals logged yet</div>';
}

// ── PROGRESS ─────────────────────────────────────────────────────
function renderProgress(){
  var grid = document.getElementById('ov-grid');
  grid.innerHTML = '';
  for(var wk=1;wk<=6;wk++){
    var pct = Math.round(getWeekPct(wk)*100);
    var cell = document.createElement('div');
    cell.className = 'ov-cell'+(wk===week?' current':pct>=60?' done':'');
    cell.innerHTML = '<div class="ov-wk">WK '+wk+'</div><div class="ov-pct">'+pct+'%</div>';
    cell.onclick = (function(w){ return function(){ week=w; document.getElementById('wk-display').textContent='WK '+w; renderWorkout(); switchTab('workout',document.querySelector('.tab')); }; })(wk);
    grid.appendChild(cell);
  }

  var area = document.getElementById('checkin-area');
  var html = '';
  for(var wk2=1;wk2<=6;wk2++){
    var ck = logs['checkin_w'+wk2]||'';
    html += '<div class="checkin-card">'
      +'<div class="checkin-title">Week '+wk2+' Check-In</div>'
      +'<textarea class="checkin-ta" rows="3" data-wk="'+wk2+'" placeholder="Weight, measurements, how you feel...">' + ck + '</textarea>'
      +'</div>';
  }
  area.innerHTML = html;
  area.querySelectorAll('.checkin-ta').forEach(function(ta){
    ta.addEventListener('change', function(){
      logs['checkin_w'+this.dataset.wk] = this.value; save();
    });
  });
}

// ── SYNC ─────────────────────────────────────────────────────────
function exportData(){
  var data = JSON.stringify({logs:logs,nutrLogs:nutrLogs});
  if(navigator.clipboard){
    navigator.clipboard.writeText(data).then(function(){ toast('Copied to clipboard!'); }).catch(function(){ fallbackCopy(data); });
  } else { fallbackCopy(data); }
}
function fallbackCopy(str){
  var ta = document.createElement('textarea');
  ta.value = str; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  toast('Copied!');
}
function importData(){
  var txt = prompt('Paste your backup data:');
  if(!txt) return;
  try{
    var d = JSON.parse(txt);
    logs=d.logs||{}; nutrLogs=d.nutrLogs||{};
    save(); renderWorkout(); renderNutrition();
    toast('Data restored!');
  } catch(e){ toast('Invalid data format'); }
}
function clearData(){
  if(!confirm('Clear all workout data? This cannot be undone.')) return;
  logs={}; nutrLogs={}; save();
  renderWorkout(); renderNutrition();
  toast('All data cleared');
}

// ── INIT ─────────────────────────────────────────────────────────
window.onload = function(){
  load();
  var today = ['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
  if(WORKOUTS[today]) day = today;
  renderWorkout();
  renderStreakBar();
  renderCardio();
  renderNutrition();
  renderProgress();
  var dl = document.getElementById('app-date-lbl');
  if(dl){ var d=new Date(); dl.textContent=d.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'}); }
};
</script>
